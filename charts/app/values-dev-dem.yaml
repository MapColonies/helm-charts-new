# ====================================================================================================
# Common
# ====================================================================================================
common:

  # ====================================================================================================
  # K8S Services List
  # ====================================================================================================
  k8s-services-list:
    nameOverride:
    fullnameOverride:
    # --------------- common --------------
    commonLabels:
    commonAnnotations:
    # ----------- initContainers ----------
    volumePermissions:
      enabled: false
    # ------ volumes and volumeMounts -----
    persistence:
      enabled: false
    # ----------- command/debug -----------
    diagnosticMode:
      enabled: false
      # command:
      #   - sleep
      # args:
      #   - infinity
    # --------- MAIN_OBJECT_BLOCK ---------
    configValues:
      deploymentAnnotations:
        # collectord.io/index: '' # PROVIDE SPLUNK INDEX
      autoscaling:
        enabled: false
      replicaCount: 1
      podAnnotations:
        enabled: true
        resetOnConfigChange: true
        annotations:
      prometheus:
        scrape: false
      metrics:
        enabled: false
      tracing:
        enabled: false
      podSecurityContext:
        enabled: false
      # ----------- containers ------------
      image:
        repository: common/k8s-services-list
        tag: v1.3.1
        pullPolicy: Always
        debug: false
      containerSecurityContext:
        enabled: true
        runAsNonRoot: true
        runAsUser: 1000700000
      extraEnvVars:
        - name: SERVER_PORT
          value: '{{ .Values.configValues.containerPorts.http }}'
      extraEnvVarsCM: '{{ template "common.names.fullname" . }}'
      extraEnvVarsSecret:
      resources:
        limits:
          cpu: 200m
          memory: 200Mi
        requests:
          cpu: 50m
          memory: 200Mi
      containerPorts:
        http: 8080
        https: 443
      livenessProbe:
        enabled: true
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 1
        failureThreshold: 3
        successThreshold: 1
      readinessProbe:
        enabled: true
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 1
        failureThreshold: 3
        successThreshold: 1
      startupProbe:
        enabled: false
    env:
      logLevel: info
      logPrettyPrintEnabled: false
      responseCompressionEnabled: true
      requestPayloadLimit: 1mb
    route:
      enabled: true
      annotations:
        haproxy.router.openshift.io/rewrite-target: /
      timeout:
        enabled: false
        duration: 60s
      routesMapping:
        - hostname:
          path: /
          suffix:
      targetPort: http
      tls:
        enabled: true
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
        useCerts: false
      extraRules:
    ingress:
      enabled: false
      apiVersion:
      type: nginx-org
      annotations:
      pathType: Prefix
      hostname: libot.wwest.local
      extraHosts: []
      extraPaths: []
      path: /service-discovery
      extraRules: []
      extraTls: []
      selfSigned: false
      tls: true
      cors:
        enabled: true
        origin: '*'
    service:
      annotations:
      ports:
        http: 80
      protocol: TCP
    serviceAccount:
      create: true
    rbac:
      create: true
      rules:
        - apiGroups:
            - apps
          resources:
            - deployments
          verbs:
            - get 
            - watch
            - list
        - apiGroups: 
            - ""
          resources:
            - endpoints 
            - services
          verbs:
            - get 
            - watch
            - list
    podSecurityPolicy:
      enabled: false

  # ====================================================================================================
  # MC Thumbnail Generator
  # ====================================================================================================
  mc-thumbnail-generator:
    nameOverride:
    fullnameOverride:
    # --------------- common --------------
    commonLabels:
    commonAnnotations:
    # ----------- initContainers ----------
    volumePermissions:
      enabled: false
    # ------ volumes and volumeMounts -----
    persistence:
      enabled: false
