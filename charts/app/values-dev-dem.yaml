      podSecurityContext:
        enabled: false
      # ----------- containers ------------
      image:
        repository: common/mc-thumbnail-generator
        tag: v3.1.1
        pullPolicy: Always
        debug: false
      containerSecurityContext:
        enabled: true
        runAsNonRoot: true
        runAsUser: 1000700000
      extraEnvVars:
