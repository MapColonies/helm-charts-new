  # ====================================================================================================
  # Catalog Web App BFF
  # ====================================================================================================
  catalog-web-app-bff:
    nameOverride:
    fullnameOverride:
    # --------------- common --------------
    commonLabels:
    commonAnnotations:
    # ----------- initContainers ----------
    volumePermissions:
      enabled: false
    # ------ volumes and volumeMounts -----
    persistence:
      enabled: false
    # ----------- command/debug -----------
