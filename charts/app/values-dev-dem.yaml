      enabled: false
      apiVersion:
      type: nginx-org
      annotations:
      pathType: Prefix
      hostname: libot.wwest.local
      extraHosts: []
      extraPaths: []
      path: /thumbnail-generator
      extraRules: []
      extraTls: []
      selfSigned: false
      tls: true
      cors:
        enabled: true
        origin: '*'
    service:
