      logLevel: info
      logPrettyPrintEnabled: false
      responseCompressionEnabled: true
      requestPayloadLimit: 1mb
      publicUrl: '.'
      wsProtocol: wss://
      serviceProtocol: https://
      serviceName: catalog-dem-dev.mapcolonies.net/bff
      catalogAppUserId: catalog-app-{CURRENT_USER}@mapcolonies.net
      mapServerPublishPoint: ''
      mapServerUrl: ''
      mapServerChannel: ''
      mapServerVersion: ''
      mapServerRequest: ''
      activeLayer: OSM_LAYER
      loggerHttpHost: ''
      loggerHttpPort: ''
      loggerHttpPath: ''
      loggerLevel: warn
      bboxAreaSquareKmLimit: 10000
      language: he
      backendLocale: he
      jobManager:
