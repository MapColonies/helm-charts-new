        enabled: false
      replicaCount: 1
      podAnnotations:
        enabled: true
        resetOnConfigChange: true
        annotations:
      prometheus:
        scrape: false
      metrics:
        enabled: false
      tracing:
        enabled: false
      # topologySpreadConstraints:
      #   - maxSkew: 1
      #     topologyKey: zone
      #     whenUnsatisfiable: DoNotSchedule
      #     labelSelector:
      #       matchLabels:
      #         app.kubernetes.io/name: '{{ include "common.names.name" . }}'
      podSecurityContext:
        enabled: false
      # ----------- containers ------------
      image:
        repository: app/catalog-web-app-bff
        tag: v4.0.4
        pullPolicy: Always
        debug: false
      containerSecurityContext:
        enabled: true
        runAsNonRoot: true
        runAsUser: 1000700000
      extraEnvVars:
        - name: SERVER_PORT
          value: '{{ .Values.configValues.containerPorts.http }}'
      extraEnvVarsCM: '{{ template "common.names.fullname" . }}'
      extraEnvVarsSecret:
      resources:
        limits:
          cpu: 500m
          memory: 500Mi
        requests:
          cpu: 125m
          memory: 500Mi
      containerPorts:
        http: 8080
        https: 443
      customLivenessProbe:
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 1
        failureThreshold: 3
        successThreshold: 1
        httpGet:
          path: /docs/api
          port: http
      customReadinessProbe:
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 1
        failureThreshold: 3
        successThreshold: 1
        httpGet:
          path: /docs/api
          port: http
      startupProbe:
        enabled: false
      extraVolumeMounts:
        - name: production-json
          mountPath: /usr/src/app/config/production.json
          subPath: production.json
        - name: root-ca
          mountPath: '{{ (include "common.secrets.getSecretByName" (dict "name" "root-ca" "key" "path" "context" .)) }}'
      extraVolumes:
        - name: production-json
          configMap:
            name: '{{ template "common.names.fullname" . }}'
            items:
              - key: production.json
                path: production.json
        - name: root-ca
          secret:
            secretName: root-ca
    env:
      logLevel: info
      logPrettyPrintEnabled: false
      responseCompressionEnabled: true
      requestPayloadLimit: 15mb
      basePath: bff
      openapiFilePath: ./openapi3.yaml
      adminPassword: 123456
      cswRasterUrl: NOT_DEPLOYED
      csw3DUrl: NOT_DEPLOYED
      cswDEMUrl: http://dem-pycsw-all-nginx-service:8080
      catalogServiceRasterUrl: NOT_DEPLOYED
      catalogService3DUrl: NOT_DEPLOYED
      catalogServiceDEMUrl: NOT_IMPLEMENTED
      ingestionServiceRasterUrl: NOT_DEPLOYED
      ingestionService3DUrl: NOT_DEPLOYED
      ingestionServiceDEMUrl: NOT_IMPLEMENTED
      storageExplorerRasterUrl: NOT_DEPLOYED
      storageExplorer3DUrl: NOT_DEPLOYED
      storageExplorerDEMUrl: NOT_IMPLEMENTED
      storageExplorerBufferSize: 1048576
      validationServiceRasterUrl: NOT_DEPLOYED
      exportLayerRasterUrl: NOT_DEPLOYED # common template (does not exist yet) might be used like this '{{template common.service.url (dict release "raster-dev" name "export") }}'
      exportLayer3DUrl: NOT_IMPLEMENTED
      exportLayerDEMUrl: NOT_IMPLEMENTED
      jobManagerServiceCommonUrl: NOT_DEPLOYED
      jobManagerServiceTypes: Ingestion_New,Ingestion_Update,Ingestion_Swap_Update,TilesSeeding,Ingestion_New_3D,3D_Ingestion,3D_Deletion,3D_Delete
      lookupTablesServiceUrl: NOT_DEPLOYED
      serviceDiscoveryUrl: http://app-k8s-services-list
      externalServices:
        pycswRecordRasterUrl: NOT_DEPLOYED
        pycswRecord3DUrl: NOT_DEPLOYED
        pycswRecordDEMUrl: https://catalog-dev.mapcolonies.net/api/dem/v1
        mapServerRecordRasterUrl: NOT_DEPLOYED
      mapServiceRasterUrl: NOT_DEPLOYED
      wfsUrl: https://geoserver-secured-vector-dev.apps.j1lk3njp.eastus.aroapp.io/geoserver/mock/wfs
      wfsServicesConfig: '{"buildings": {"color": "#0465b0", "outlineColor": "#0465b0", "dWithin": 3, "isVisualized": true, "translationId": "actions.wfs.buildings-title", "icon": "location_city", "markerIcon": "buildings-marker"}, "addrs": {"translationId": "תשאול כתובת", "isVisualized": "false"}}'
      polygonPartsUrl: NOT_DEPLOYED
      demHeightsUrl: https://dem-dev.mapcolonies.net/api/heights/v1
    route:
      enabled: true
      annotations:
        haproxy.router.openshift.io/rewrite-target: /
      timeout:
        enabled: false
        duration: 60s
      routesMapping:
        - hostname: catalog-dem-dev.mapcolonies.net
          path: /bff
          suffix:
      targetPort: http
      tls:
        enabled: true
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
        useCerts: true
      extraRules:
    ingress:
      enabled: false
      apiVersion:
      type: nginx-kubernetes
      annotations:
      pathType: Prefix
      hostname: libot.wwest.local
      extraHosts: []
      extraPaths: []
      path: /bff
      extraRules: []
      extraTls: []
      selfSigned: false
      tls: true
      cors:
        enabled: true
        origin: '*'
    service:
      annotations:
      ports:
        http: 80
      protocol: TCP
    serviceAccount:
      create: false

