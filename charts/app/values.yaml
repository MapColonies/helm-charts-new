# ====================================================================================================
# Global
# ====================================================================================================
global:
  owner: app
  currentSubChart: catalog
  enable-services:
    enabled: true
    catalog-app: true
    catalog-web-app-bff: true
    mc-web-tools: true
    k8s-services-list: true
    mc-thumbnail-generator: false
# ====================================================================================================
# Shared
# ====================================================================================================
  shared:
    servedEntityTypes: RECORD_ALL
    accessToken:
      attributeName: token
      injectionType: queryParam
      tokenValue: TOKEN
    rasterIngestionFilesStructure: '{"data": {"allowedExt": [".gpkg"], "selectableExt": [".gpkg"], "relativeToAOIDirPath": "./data", "producerFileName": "*", "selectablePattern": "*"}, "product": {"allowedExt": [".shp", ".shx", ".dbf", ".prj", ".sbn", ".sbx", ".xml", ".cpg", ".qix"], "selectableExt": [".shp"], "relativeToAOIDirPath": "./shape", "producerFileName": "Product", "selectablePattern": "Product"}, "shapeMetadata": {"allowedExt": [".shp", ".shx", ".dbf", ".prj", ".sbn", ".sbx", ".xml", ".cpg", ".qix"], "selectableExt": [".shp"], "relativeToAOIDirPath": "./shape", "producerFileName": "ShapeMetadata", "selectablePattern": "ShapeMetadata"}}'
    sso:
      enabled: false
      redirectUrl:
        ui:
        tools:

# ====================================================================================================
# Catalog App
# ====================================================================================================
catalog-app:
  nameOverride:
  fullnameOverride:
  # --------------- common --------------
  commonLabels:
  commonAnnotations:
  # ----------- initContainers ----------
  volumePermissions:
    enabled: false
  # ------ volumes and volumeMounts -----
  persistence:
    enabled: false
  # ----------- command/debug -----------
  diagnosticMode:
    enabled: false
    # command:
    #   - sleep
    # args:
    #   - infinity
  # --------- MAIN_OBJECT_BLOCK ---------
  configValues:
    deploymentAnnotations:
      # collectord.io/index: '' # PROVIDE SPLUNK INDEX
    autoscaling:
      enabled: false
    replicaCount: 1
    podAnnotations:
      enabled: true
      resetOnConfigChange: true
      annotations:
    prometheus:
      scrape: false
    metrics:
      enabled: false
    tracing:
      enabled: false
    # topologySpreadConstraints:
    #   - maxSkew: 1
    #     topologyKey: zone
    #     whenUnsatisfiable: DoNotSchedule
    #     labelSelector:
    #       matchLabels:
    #         app.kubernetes.io/name: '{{ include "common.names.name" . }}'
    podSecurityContext:
      enabled: false
    # ----------- containers ------------
    image:
      repository: app/catalog-app
      tag: v4.4.2
      pullPolicy: Always
      debug: false
    containerSecurityContext:
      enabled: true
      allowPrivilegeEscalation: false
      # runAsUser: 0
    extraEnvVars:
      - name: SERVER_PORT
        value: '{{ .Values.configValues.containerPorts.http }}'
    extraEnvVarsCM: '{{ template "common.names.fullname" . }}'
    extraEnvVarsSecret:
    resources:
      limits:
        cpu: 200m
        memory: 500Mi
      requests:
        cpu: 50m
        memory: 500Mi
    containerPorts:
      http: 8080
      https: 443
    customLivenessProbe:
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
      successThreshold: 1
      httpGet:
        path: /env-config.js
        port: http
    customReadinessProbe:
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
      successThreshold: 1
      httpGet:
        path: /env-config.js
        port: http
    startupProbe:
      enabled: false
    extraVolumeMounts:
      - name: nginx-config
        mountPath: /etc/nginx/conf.d/default.conf
        subPath: default.conf
    extraVolumes:
      - name: nginx-config
        configMap:
          name: '{{ template "common.names.fullname" . }}'
          items:
            - key: default.conf
              path: default.conf
  env:
    logLevel: info
    logPrettyPrintEnabled: false
    responseCompressionEnabled: true
    requestPayloadLimit: 1mb
    publicUrl: '.'
    wsProtocol: wss://
    serviceProtocol: https://
    serviceName: ''
    catalogAppUserId: catalog-app-{CURRENT_USER}@mapcolonies.net
    mapServerPublishPoint: ''
    mapServerUrl: ''
    mapServerChannel: ''
    mapServerVersion: ''
    mapServerRequest: ''
    activeLayer: OSM_LAYER
    loggerHttpHost: ''
    loggerHttpPort: ''
    loggerHttpPath: ''
    loggerLevel: warn
    bboxAreaSquareKmLimit: 10000
    language: he
    backendLocale: he
    jobManager:
      pollingCycleInterval: 120000
      filterDaysTimeSlot: 1
      maxDateRangeDays: 60
    defaultUser:
      role: USER
    runningMode:
      type: PRODUCTION
      autoComplete: false
      cswDefaultPageSize: 200
    export:
      defaultZoomLevel: '' #todo
      maxZoomLevel: '' #todo
    map:
      center: '[34.811, 31.908]'
      zoom: 7
      mapMode2D: INFINITE_SCROLL
      useOptimizedTileRequests: false
      showDebuggerTool: true
      showActiveLayersTool: true
      showGeocoderTool: true
    baseMaps: ''
    defaultTerrainProviderUrl: ''
    webToolsUrl: ''
    modelViewerRoute: simple-catalog-viewer
    modelViewerTokenValue: ''
    whatsnewUrl: ''
    projectVersion: 2.2.0
    activeLayerPropeties:
      mapUrlPath: '' #todo
      exportPath: '' #todo
      urlPattern:
        service: ''
        layers: ''
        tiled: true
        matrixSet: ''
        style: ''
        projection: ''
    sitesConfig: '{"masters": [], "slaves": [], "generics": []}'
    bffPath: /bff/graphql
    selectionModeDefault: ''
    showSelectionModeSwitch: true
    polygonParts:
      featureTypePrefix: 'polygonParts:'
      densityFactor: 0.3
      geometryErrorsThreshold: 0.05
      areaThreshold: 10
      max:
        WFSFeatures: 500
        showFootprintZoomLevel: 10
        perShape: 300
        vertices: 300000
    wfs:
      style: '{"color": "#01FF1F", "hover": "#24AEE9", "pointStroke": "#01FF1F"}'
      keyField: osm_id
      max:
        pageSize: 300
        zoomLevel: 14
        cacheSize: 6000
    geocoder:
      url: ''
      callbackUrl: ''
    changesInShapeFiles:
      timeDifferenceGraceMinutes: 10
      timeModifiedThresholdHours: 12
  route:
    enabled: true
    annotations:
      haproxy.router.openshift.io/rewrite-target: /
    timeout:
      enabled: false
      duration: 60s
    routesMapping:
      - hostname:
        path: /
        suffix:
    targetPort: http
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
      useCerts: true
    extraRules:
  ingress:
    enabled: false
    apiVersion:
    type: nginx-kubernetes
    annotations:
    pathType: Prefix
    hostname: libot.wwest.local
    extraHosts: []
    extraPaths: []
    path: /ui
    extraRules: []
    extraTls: []
    selfSigned: false
    tls: true
    cors:
      enabled: true
      origin: '*'
  service:
    annotations:
    ports:
      http: 80
    protocol: TCP
  serviceAccount:
    create: false

