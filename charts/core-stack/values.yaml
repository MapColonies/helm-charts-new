global:

minio:
  enabled: true
  auth:
    rootUser: minio
    rootPassword: minio123
  persistence:
    size: 10Gi
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  service:
    port: 9001
    targetPort: 9001
  commonLabels:
    mapcolonies.io/environment: "production"
    mapcolonies.io/component: "infrastructure"
    mapcolonies.io/part-of: "core-stack"
    mapcolonies.io/owner: "infra" 

redis:
  enabled: true
  metrics:
    enabled: true
    containerSecurityContext:
      enabled: false
      runAsUser: 1000870000
  architecture: standalone
  auth:
    enabled: true
    password: password
  commonConfiguration: |-
    # Enable AOF https:redis.io/topics/persistence#append-only-file
    appendonly no
    protected-mode no
    # Disable RDB https, AOF persistence already enabled.
    save ""
  debug: false
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: 7.2.1
  commonLabels:
    mapcolonies.io/environment: "production"
    mapcolonies.io/component: "infrastructure"
    mapcolonies.io/part-of: "core-stack"
    mapcolonies.io/owner: "infra" 
  master:
    configuration: |
      maxmemory 5gb
      maxmemory-policy allkeys-lfu
    containerSecurityContext:
      enabled: false
      runAsUser: 1000870000
    count: 1
    disableCommands:
      - FLUSHALL
    kind: StatefulSet
    persistence:
      accessModes:
        - ReadWriteOnce
      enabled: false
      size: 1Gi
    podLabels:
      app: redis
      role: master
    podSecurityContext:
      enabled: false
      fsGroup: 1000870000
    resources:
      limits:
        cpu: 0.5
        memory: 5.5Gi
      requests:
        cpu: 0.125
        memory: 5.5Gi
    pullPolicy: Always
    serviceAccount:
      create: false

elasticsearch:
  enabled: true
  image:
    tag: 8.16.1-debian-12-r1

  commonLabels:
    mapcolonies.io/environment: "production"
    mapcolonies.io/component: "infrastructure"
    mapcolonies.io/part-of: "core-stack"
    mapcolonies.io/owner: "infra" 

  master:
    containerSecurityContext:
      enabled: false
    podSecurityContext:
      enabled: false

  coordinating:
    containerSecurityContext:
      enabled: false
    podSecurityContext:
      enabled: false

  data:
    containerSecurityContext:
      enabled: false
    podSecurityContext:
      enabled: false

  ingest:
    containerSecurityContext:
      enabled: false
    podSecurityContext:
      enabled: false

  extraEnvVars:
  - name: ELASTIC_USERNAME
    value: elastic
  - name: ELASTIC_PASSWORD
    value: adminpassword

  sysctlImage:
    enabled: false
