{{- if and .Values.postgres.enabled .Values.postgres.backups.enabled .Values.postgres.backups.secret.createFromTemplate }}
# Azure Blob Storage authentication for CNPG backups
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.backups.secret.name }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  AZURE_STORAGE_ACCOUNT: {{ .Values.postgres.backups.secret.data.storageAccount | quote }}
  AZURE_STORAGE_KEY: {{ .Values.postgres.backups.secret.data.storageKey | quote }}
  # Optional: specify the Azure environment (default is AzurePublicCloud)
  # AZURE_STORAGE_ENVIRONMENT: "AzurePublicCloud"
{{- end }}
