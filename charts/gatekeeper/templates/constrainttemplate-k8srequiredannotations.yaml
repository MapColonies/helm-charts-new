{{- if .Values.constraints.k8sRequiredAnnotations.enabled }}
apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8srequiredannotations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredAnnotations
      validation:
        openAPIV3Schema:
          properties:
            annotations:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredannotations

        violation[{"msg": msg, "details": {"missing": missing}}] {
          required := {a | a := input.parameters.annotations[_]}
          annos := object.get(input.review.object.metadata, "annotations", {})
          provided := {k | annos[k]}
          missing := required - provided
          count(missing) > 0
          msg := sprintf("Missing required annotations: %v", [missing])
        }
{{- end }}
