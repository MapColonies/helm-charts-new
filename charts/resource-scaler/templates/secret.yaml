{{- if .Values.slack.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.slack.secretName | default "slack-webhook" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "resource-scaler.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.slack.secretKey | default "webhook-url" }}: {{ .Values.slack.webhookUrl | b64enc | quote }}
{{- end }}
