{{- if .Values.scaleDown.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "resource-scaler.fullname" . }}-down
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "resource-scaler.labels" . | nindent 4 }}
    component: scale-down
spec:
  schedule: {{ .Values.scaleDown.schedule | quote }}
  concurrencyPolicy: Replace
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "resource-scaler.selectorLabels" . | nindent 12 }}
            component: scale-down
        spec:
          serviceAccountName: {{ .Values.serviceAccount.name }}
          restartPolicy: OnFailure
          {{- if .Values.imagePullSecretName }}
          imagePullSecrets:
            - name: {{ .Values.imagePullSecretName }}
          {{- end }}
          containers:
            - name: scaler
              image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["python3", "/app/scaler.py"]
              args: {{ include "resource-scaler.args" (list . (list "down")) | nindent 16 }}
              {{- if and .Values.slack.enabled .Values.slack.secretName }}
              env:
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.slack.secretName }}
                      key: {{ .Values.slack.secretKey | default "webhook-url" }}
              {{- end }}
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "100m"
                limits:
                  memory: "128Mi"
                  cpu: "200m"
{{- end }}
