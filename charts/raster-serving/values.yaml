# ====================================================================================================
# Pycsw
# ====================================================================================================
pycsw:
  enabled: true
  replicaCount: 1
  image:
    repository: common/pycsw
    tag: "v6.4.1"
    pullPolicy: Always

  mclabels:
    component: backend
    partOf: serving
    owner: raster
    gisDomain: raster
    prometheus:
      enabled: true
      port: 8080
    logScraping: true

  filterProductStatus: true

  env:
    # FLAG
    loglevel: WARNING
    db:
      schema: RasterCatalogManager
      requirePassword: true
    maxrecords: null
    logfile: ""
    uwsgi:
      # FLAG
      processes: 6
      # FLAG
      threads: 2
      statsServer:
        enabled: true
        stats: 1717
        statsMinify: true
    cors:
      enabled: true
      allowedOrigin: "*"
      allowedHeaders: "x-api-key"

  resources:
    enabled: false
    value:
      # FLAG
      limits:
        cpu: 1
        memory: 1.5Gi
      requests:
        cpu: 0.25
        memory: 1.5Gi

  nginx:
    image:
      repository: nginx-otel-unprivileged
      tag: "v1.0.0"
    replicaCount: 1
    enabled: true

    nginxTargetPort: 8080
    targetPort: 8080

    authorization:
      enabled: true
      domain: "raster"
      token:
        queryName: token

    resources:
      enabled: false
      value:
        # FLAG
        limits:
          cpu: 0.25
          memory: 350Mi
        requests:
          cpu: 0.0625
          memory: 350Mi

    route:
      enabled: true
      path: /api/raster/v1
      timeout:
        enabled: false # defaults to 30s by openshift
        duration: 60s # supported units (us, ms, s, m, h, d)
      tls:
        enabled: true
        useCerts: true

    ingress:
      enabled: false
      path: /api/raster/v1
      tls:
        enabled: true
        useExternal: ""

  uwsgiExporter:
    imagePullPolicy: Always
    image:
      repository: "timonwong/uwsgi-exporter"
      tag: "latest"
    env:
      logLevel: info # one of [debug, info, warn, error]
    port: 9117
    resources:
      enabled: false
      value:
        limits:
          cpu: 0.1
          memory: 128Mi
        requests:
          cpu: 0.025
          memory: 128Mi

