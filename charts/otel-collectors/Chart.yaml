apiVersion: v2
name: otel-collectors
description: A wrapper otel Helm chart for grouping both external and internal collectors
type: application
version: 1.0.0
appVersion: 0.115.1
annotations:
  domain: infra
dependencies:
  - name: opentelemetry-collector
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    version: 0.111.0
    alias: otel
  - name: opentelemetry-collector
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    version: 0.111.0
    alias: otel-internal
