otel:
  fullnameOverride: infra-otel
  serviceAccount:
    create: false
    name: monitoring
  image:
    repository: infra/opentelemetry-collector-contrib

  mode: deployment

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8888"

  ports:
    metrics:
      enabled: true

  config:
    receivers:
      otlp:
        protocols:
          http:
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"
            endpoint: ${env:MY_POD_IP}:4318
    exporters:
      loadbalancing:
        routing_key: "traceID"
        protocol:
          otlp:
            timeout: 5s
            tls:
              insecure: true
        resolver:
          # use k8s service resolver, if collector runs in kubernetes environment
          k8s:
            service: infra-otel-internal
            ports:
              - 4317
      debug: {}

    processors:
      # attributes:
      # # This is for dev only and for debugging
      #   actions:
      #     - key: ALB
      #       value: "true"
      #       action: insert
      k8sattributes:
        auth_type: 'serviceAccount'
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.start_time
            - k8s.deployment.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection

    service:
      pipelines:
        traces:
          exporters:
            - loadbalancing
          processors:
            - memory_limiter
            # - attributes
            - k8sattributes
            - batch        

otel-internal:
  fullnameOverride: infra-otel-internal
  serviceAccount:
    create: false
    name: monitoring
  image:
    repository: infra/opentelemetry-collector-contrib

  mode: deployment

  service:
    type: ClusterIP
    clusterIP: None

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8888"

  ports:
    metrics:
      enabled: true

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"
            endpoint: ${env:MY_POD_IP}:4318
    exporters:
      otlphttp:
        tls:
          insecure: true

    processors:
      tail_sampling:
        decision_wait: 10s
        expected_new_traces_per_sec: 100
        policies:
        - name: exclude_health_checks_and_metrics
          type: string_attribute
          string_attribute:
            key: http.target
            values:
              - \/metrics
              - \/liveness
              - \/health
            enabled_regex_matching: true
            invert_match: true
        - name: always_sample_rest
          type: always_sample

    service:
      pipelines:
        traces:
          exporters:
            - otlphttp
          processors:
            - memory_limiter
            # - attributes
            - tail_sampling
            - batch
