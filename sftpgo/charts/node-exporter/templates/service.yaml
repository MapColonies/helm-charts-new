{{- $releaseName := .Release.Name -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $releaseName }}-node-exporter
  labels:
    {{ include "mclabels.labels" . | nindent 4 }}
  annotations:
    {{ include "mclabels.annotations" . | nindent 4 }}
spec:
  selector:
    app: node-exporter
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.port }}
      targetPort: {{ .Values.targetPort }}
